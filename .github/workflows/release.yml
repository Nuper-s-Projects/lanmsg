name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Build LanMsg-Setup.zip
        shell: pwsh
        run: ./build-release.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LanMsg-Setup
          path: dist/LanMsg-Setup.zip
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LanMsg-Setup.zip
          generate_release_notes: true

      - name: Publish latest pre-release
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload latest dist/LanMsg-Setup.zip --clobber 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create latest dist/LanMsg-Setup.zip `
              --title "LanMsg Latest" `
              --notes "Automated build from main branch. Install with the one-line script in README." `
              --prerelease
          }
